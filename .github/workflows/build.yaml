steps:
      - uses: actions/checkout@v4 # Use stable v4
        with:
          fetch-depth: 0 
          
      - name: Install dependencies
        run: yarn install

      - name: Test and coverage
        # We must use the config file to avoid JSX/import.meta errors
        run: yarn jest --coverage --config jest.config.ts

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        with:
          # This tells SonarCloud where the coverage data is
          args: >
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.sources=src
            -Dsonar.tests=tests
        env:
          SONAR_TOKEN: ${{ secrets.SONARCLOUD_TOKEN }}